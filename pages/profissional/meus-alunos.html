<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus Alunos | MyPersonal</title>
  <link rel="stylesheet" href="../../assets/css/reset.css">
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages/meus-alunos.css">
  <link rel="stylesheet" href="../../assets/css/responsive.css">
</head>
<body data-page-title="Meus Alunos">
  <div class="app-layout">
    <div id="sidebar-mount"></div>
    <div id="topbar-mount"></div>

    <main class="main-content">

      <!-- Tela: Lista de Alunos -->
      <div class="tela ativa" id="telaMeusAlunos">
        <div class="alunos-toolbar">
          <input type="text" class="search-input" placeholder="Buscar aluno..." id="searchInput" />
          <button class="btn btn-primary" onclick="irParaCadastro()">+ Cadastrar aluno</button>
        </div>



        <div class="versao-tabela ativa tabela-wrapper" id="tabelaCompleta">
          <table class="alunos-table">
            <thead>
              <tr>
                <th>Nome</th>
                <th>Último Treino</th>
                <th>Próx. Treino</th>
                <th>Última Consulta</th>
                <th>Próx. Consulta</th>
                <th>Status</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody class="corpo-tabela" id="corpoCompleta">
              <!-- preenchido pelo localStorage na primeira execução -->
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <script src="../../assets/js/sidebar-loader.js"></script>
  <script src="../../assets/js/auth-storage.js"></script>
  <script src="../../assets/js/aluno-contexto.js"></script>
  <script src="../../assets/js/meus-alunos.js"></script>
</body>
</html>
