<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Dieta | MyPersonal</title>
  <link rel="stylesheet" href="../../assets/css/reset.css">
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages/dietas.css">
  <link rel="stylesheet" href="../../assets/css/responsive.css">
</head>
<body data-page-title="Editar Dieta — Eliabe Monteiro" data-back="perfil_do_aluno_aba_dieta.html|Perfil do Aluno" data-active-page="alunos" data-diet-page="professional-editor">
  <div class="app-layout">
    <div id="sidebar-mount"></div>
    <div id="topbar-mount"></div>

    <main class="main-content">
      <h2 class="section-title">Dia da semana</h2>
      <div class="days" data-short-days="true"></div>

      <div class="btn-row align-start">
        <button class="btn btn-secondary" type="button" data-add-meal>Adicionar refeição</button>
      </div>

      <div class="editor-grid" data-diet-editor></div>

      <h2 class="section-title">Totais do dia</h2>
      <div class="totals" data-diet-totals></div>

      <div class="notes-area">
        <label class="section-title" for="observacoes">Observações gerais da dieta</label>
        <textarea id="observacoes" placeholder="Orientações gerais, restrições, metas nutricionais"></textarea>
      </div>

      <div class="btn-row">
        <a class="btn btn-secondary" href="perfil_do_aluno_aba_dieta.html">Cancelar</a>
        <div class="btn-group">
          <button class="btn btn-secondary" type="button" data-save-diet>Salvar dieta</button>
          <button class="btn btn-primary" type="button" data-save-diet>Salvar e notificar aluno</button>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-backdrop" id="diet-success-modal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="diet-success-title">
      <span class="check-icon">✓</span>
      <h2 id="diet-success-title">Dieta salva!</h2>
      <p>A dieta foi atualizada e o aluno foi notificado.</p>
      <div class="btn-group center-actions">
        <a class="btn btn-secondary" href="perfil_do_aluno_aba_dieta.html">Ver dieta</a>
        <a class="btn btn-primary" href="perfil_do_aluno_aba_dieta.html">Voltar ao perfil</a>
      </div>
    </div>
  </div>

  <script src="../../assets/js/sidebar-loader.js"></script>
  <script src="../../assets/js/aluno-contexto.js"></script>
  <script src="../../assets/js/dietas-storage.js"></script>
</body>
</html>
