<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil do Aluno | MyPersonal</title>
  <link rel="stylesheet" href="../../assets/css/reset.css">
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages/dashboard.css">
  <link rel="stylesheet" href="../../assets/css/pages/acoes-profissional.css">
  <link rel="stylesheet" href="../../assets/css/pages/dietas.css">
  <link rel="stylesheet" href="../../assets/css/responsive.css">
</head>
<body data-page-title="Perfil do Aluno — Eliabe Monteiro" data-back="meus-alunos.html|Meus Alunos" data-active-page="alunos" data-diet-page="professional-view">
  <div class="app-layout">
    <div id="sidebar-mount"></div>
    <div id="topbar-mount"></div>

    <main class="main-content">
      <header class="student-header dashboard-box">
        <div class="avatar avatar-lg">EM</div>
        <div>
          <h2 class="student-name" data-current-student-name>Eliabe Monteiro</h2>
          <p class="page-subtitle">Aluno desde: Jan/2025</p>
        </div>
        <div class="perfil-acoes">
          <button class="btn btn-secondary" onclick="window.location.href='editar-aluno.html'">✏ Editar</button>
          <button class="btn-excluir">🗑 Excluir</button>
        </div>
      </header>

      <nav class="tabs" aria-label="Seções do aluno">
        <a href="perfilaluno.html" class="tab">Treino</a>
        <a href="perfil_do_aluno_aba_dieta.html" class="tab active">Dieta</a>
        <a href="estatisticaprofissional.html" class="tab">Estatísticas</a>
      </nav>

      <div class="profile-diet-grid space-top">
        <section class="section-block">
          <h2 class="section-title">Dieta atual</h2>
          <div class="days" data-short-days="true"></div>

          <div class="summary-list" data-diet-summary></div>

          <h2 class="section-title">Totais do dia</h2>
          <div class="totals" data-diet-totals></div>

          <a class="btn btn-primary" href="cadastrar_editar_dieta.html">Editar dieta</a>
        </section>

        <section>
          <div class="section-block">
            <h2 class="section-title">Última avaliação nutricional</h2>
            <div class="muted-box tall-box">
              <p class="note-box">Nenhuma avaliação nutricional cadastrada.</p>
            </div>
          </div>

          <div class="section-block">
            <h2 class="section-title">Observações do profissional</h2>
            <div class="muted-box medium-box">
              <p class="note-box" data-diet-notes></p>
            </div>
          </div>

          <div class="section-block">
            <h2 class="section-title">Histórico de versões da dieta</h2>
            <div class="muted-box medium-box">
              <ul class="history-list" data-diet-history>
                <li><span>-</span><strong>Sem histórico</strong></li>
              </ul>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script src="../../assets/js/sidebar-loader.js"></script>
  <script src="../../assets/js/aluno-contexto.js"></script>
  <script src="../../assets/js/meus-alunos.js"></script>
  <script src="../../assets/js/dietas-storage.js"></script>
</body>
</html>
