<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mensagens | MyPersonal</title>
  <link rel="stylesheet" href="../../assets/css/reset.css">
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages/mensagens.css">
  <link rel="stylesheet" href="../../assets/css/responsive.css">
</head>
<body data-page-title="Mensagens" class="chat-page">
  <div class="app-layout">
    <div id="sidebar-mount"></div>
    <div id="topbar-mount"></div>

    <main class="main-content">
      <div class="chat-layout">

        <!-- Coluna esq: lista de conversas -->
        <aside class="chat-list">
          <div class="chat-search">
            <input type="search" class="form-control" placeholder="Buscar conversa...">
          </div>

          <div class="chat-conversations">
            <div class="chat-conversation is-active" data-conv="ana">
              <div class="avatar avatar-sm">AP</div>
              <div class="chat-conv-info">
                <p class="chat-conv-name">Ana Paula</p>
                <p class="chat-conv-preview">Treino atualizado!</p>
              </div>
              <span class="chat-conv-time">Agora</span>
            </div>

            <div class="chat-conversation" data-conv="eliabe">
              <div class="avatar avatar-sm">EM</div>
              <div class="chat-conv-info">
                <p class="chat-conv-name">Eliabe Monteiro</p>
                <p class="chat-conv-preview">Dieta revisada</p>
              </div>
              <span class="chat-conv-time">Ontem</span>
            </div>

            <div class="chat-conversation" data-conv="suporte">
              <div class="avatar avatar-sm">S</div>
              <div class="chat-conv-info">
                <p class="chat-conv-name">Suporte MyPersonal</p>
                <p class="chat-conv-preview">Bem-vindo!</p>
              </div>
              <span class="chat-conv-time">3d</span>
            </div>
          </div>
        </aside>

        <!-- Coluna dir: conversa ativa -->
        <section class="chat-thread">
          <header class="chat-thread-header">
            <p class="name" id="thread-name">Ana Paula</p>
            <p class="status">● Online</p>
          </header>

          <div class="chat-messages" id="chat-messages"></div>

          <form class="chat-input" id="chat-form">
            <input type="text" id="message-input" class="form-control" placeholder="Digite uma mensagem..." autocomplete="off">
            <button type="submit" class="btn btn-primary">Enviar</button>
          </form>
        </section>

      </div>
    </main>
  </div>

  <script src="../../assets/js/sidebar-loader.js"></script>
  <script>
    // ======================================================
    // Chat de Mensagens — estado por conversa + localStorage
    // ======================================================

    const CONVERSAS_PADRAO = {
      ana: {
        nome: "Ana Paula",
        status: "● Online",
        mensagens: [
          { autor: "Você",      texto: "Olá! Atualizei sua dieta para esta semana.", tipo: "sent"     },
          { autor: "Ana Paula", texto: "Ótimo! Vi que adicionou mais frutas.",        tipo: "received" },
          { autor: "Você",      texto: "Perfeito. Qualquer dúvida, me avisa.",        tipo: "sent"     },
          { autor: "Ana Paula", texto: "Certo! Obrigada.",                            tipo: "received" },
        ],
      },
      eliabe: {
        nome: "Eliabe Monteiro",
        status: "● Offline",
        mensagens: [
          { autor: "Eliabe Monteiro", texto: "Professor, a dieta foi revisada?",   tipo: "received" },
          { autor: "Você",            texto: "Sim! Ajustei as calorias do jantar.", tipo: "sent"     },
          { autor: "Eliabe Monteiro", texto: "Ótimo, obrigado!",                    tipo: "received" },
        ],
      },
      suporte: {
        nome: "Suporte MyPersonal",
        status: "● Online",
        mensagens: [
          { autor: "Suporte MyPersonal", texto: "Bem-vindo ao MyPersonal! Como posso ajudar?", tipo: "received" },
          { autor: "Você",               texto: "Oi! Preciso de ajuda com a agenda.",           tipo: "sent"     },
          { autor: "Suporte MyPersonal", texto: "Claro! O que aconteceu?",                      tipo: "received" },
        ],
      },
    };

    function carregarConversas() {
      try {
        const salvo = localStorage.getItem("mypersonal:conversas");
        if (salvo) {
          const parsed = JSON.parse(salvo);
          // Garante que novas conversas do padrão apareçam mesmo com storage antigo
          Object.keys(CONVERSAS_PADRAO).forEach((key) => {
            if (!parsed[key]) parsed[key] = JSON.parse(JSON.stringify(CONVERSAS_PADRAO[key]));
          });
          return parsed;
        }
      } catch (e) {}
      return JSON.parse(JSON.stringify(CONVERSAS_PADRAO));
    }

    function salvarConversas() {
      try {
        localStorage.setItem("mypersonal:conversas", JSON.stringify(conversas));
      } catch (e) {}
    }

    const conversas = carregarConversas();
    let ativaConv = "ana";

    const messagesEl = document.getElementById("chat-messages");
    const threadName = document.getElementById("thread-name");
    const statusEl   = document.querySelector(".chat-thread-header .status");
    const form       = document.getElementById("chat-form");
    const input      = document.getElementById("message-input");

    function renderThread(convId) {
      const conv = conversas[convId];
      threadName.textContent = conv.nome;
      statusEl.textContent   = conv.status;

      messagesEl.innerHTML = "";
      conv.mensagens.forEach((m) => {
        const msgEl = document.createElement("div");
        msgEl.className = `message message-${m.tipo}`;

        const authorEl = document.createElement("span");
        authorEl.className = "message-author";
        authorEl.textContent = m.autor;

        const bubbleEl = document.createElement("div");
        bubbleEl.className = "message-bubble";
        bubbleEl.textContent = m.texto;

        msgEl.appendChild(authorEl);
        msgEl.appendChild(bubbleEl);
        messagesEl.appendChild(msgEl);
      });

      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    document.querySelectorAll(".chat-conversation").forEach((conv) => {
      conv.addEventListener("click", () => {
        document.querySelectorAll(".chat-conversation").forEach((c) => c.classList.remove("is-active"));
        conv.classList.add("is-active");
        ativaConv = conv.dataset.conv;
        renderThread(ativaConv);
      });
    });

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const texto = input.value.trim();
      if (!texto) return;

      conversas[ativaConv].mensagens.push({ autor: "Você", texto, tipo: "sent" });
      salvarConversas();
      renderThread(ativaConv);
      input.value = "";
    });

    renderThread(ativaConv);
  </script>
</body>
</html>
