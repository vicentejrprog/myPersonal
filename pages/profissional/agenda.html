<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda | MyPersonal</title>
  <link rel="stylesheet" href="../../assets/css/reset.css">
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages/agenda.css">
  <link rel="stylesheet" href="../../assets/css/responsive.css">
</head>
<body data-page-title="Agenda">
  <div class="app-layout">
    <div id="sidebar-mount"></div>
    <div id="topbar-mount"></div>

    <main class="main-content">

      <!-- Header da agenda: navegação de mês + novo compromisso -->
      <div class="agenda-header">
        <h2 class="agenda-month" id="month-label">Abril 2026</h2>
        <div class="agenda-nav">
          <button class="btn-icon" id="prev-month" aria-label="Mês anterior">‹</button>
          <button class="btn-icon" id="next-month" aria-label="Próximo mês">›</button>
        </div>
        <a href="cadastrar-compromisso.html" class="btn btn-primary agenda-new-btn">
          + Novo compromisso
        </a>
      </div>

      <!-- Calendário -->
      <div class="calendar" id="calendar">
        <!-- Cabeçalho dos dias -->
        <div class="calendar-day-header">Dom</div>
        <div class="calendar-day-header">Seg</div>
        <div class="calendar-day-header">Ter</div>
        <div class="calendar-day-header">Qua</div>
        <div class="calendar-day-header">Qui</div>
        <div class="calendar-day-header">Sex</div>
        <div class="calendar-day-header">Sáb</div>
        <!-- Células do mês geradas via JS -->
      </div>

      <!-- Legenda -->
      <div class="calendar-legend">
        <div class="legend-item"><span class="legend-dot" style="background:var(--green-primary)"></span> Treino</div>
        <div class="legend-item"><span class="legend-dot" style="background:var(--blue-info-dark)"></span> Consulta</div>
        <div class="legend-item"><span class="legend-dot" style="background:var(--orange-warning)"></span> Avaliação</div>
        <div class="legend-item"><span class="legend-dot" style="background:var(--gray-500)"></span> Outro</div>
        <div class="legend-item"><span class="legend-dot" style="background:var(--cor-erro-texto)"></span> Feriado</div>
      </div>

    </main>
  </div>

  <script src="../../assets/js/sidebar-loader.js"></script>
  <script>
    // ======================================================
    // Calendário dinâmico — navegação de meses + feriados
    // Chaves no formato "YYYY-MM-DD" para casar com BrasilAPI
    // H5a — fetch client-side de API pública de feriados
    // RF01 / US01
    // ======================================================

    const eventosPorDia = {
      "2026-04-08": [{ label: "Consulta 14h - Lucas",    tipo: "consulta"  }],
      "2026-04-10": [{ label: "Treino 09h - Eliabe",     tipo: "treino"    }],
      "2026-04-15": [{ label: "Trocar treino - Eliabe",  tipo: "outro"     }],
      "2026-04-18": [{ label: "Avaliação corporal",       tipo: "avaliacao" }],
      "2026-04-22": [{ label: "Avaliação - Ana Paula",    tipo: "avaliacao" }],
      "2026-05-05": [{ label: "Treino 10h - Fernanda",   tipo: "treino"    }],
      "2026-05-20": [{ label: "Consulta - Ana Paula",    tipo: "consulta"  }],
      "2026-06-03": [{ label: "Avaliação - Lucas",       tipo: "avaliacao" }],
      "2026-06-11": [{ label: "Treino 08h - Eliabe",     tipo: "treino"    }],
      "2026-07-10": [{ label: "Consulta 09h - Fernanda", tipo: "consulta"  }],
    };

    const feriadosPorAno = {};
    const calendar   = document.getElementById("calendar");
    const monthLabel = document.getElementById("month-label");

    const NOMES_MES = [
      "Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho",
      "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro",
    ];

    const today = new Date();
    let currentYear  = today.getFullYear();
    let currentMonth = today.getMonth(); // 0-indexed

    function isoDate(y, m, d) {
      return `${y}-${String(m + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
    }

    function renderCalendar(year, month) {
      monthLabel.textContent = `${NOMES_MES[month]} ${year}`;

      // Remove células anteriores, preserva os cabeçalhos de dia da semana
      calendar.querySelectorAll(".calendar-cell").forEach((el) => el.remove());

      const offset      = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const todayKey    = isoDate(today.getFullYear(), today.getMonth(), today.getDate());

      for (let i = 0; i < offset; i++) {
        const empty = document.createElement("div");
        empty.className = "calendar-cell is-empty";
        calendar.appendChild(empty);
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const key  = isoDate(year, month, day);
        const cell = document.createElement("div");
        cell.className = "calendar-cell";
        cell.dataset.date = key;

        if (key === todayKey) cell.classList.add("is-today");

        const num = document.createElement("div");
        num.className = "calendar-day-number";
        num.textContent = day;
        cell.appendChild(num);

        (eventosPorDia[key] || []).forEach((ev) => {
          const evEl = document.createElement("div");
          evEl.className = `calendar-event event-${ev.tipo}`;
          evEl.textContent = ev.label;
          evEl.title = ev.label;
          cell.appendChild(evEl);
        });

        calendar.appendChild(cell);
      }

      // Calendário funcional — feriados decoram de forma assíncrona
      decorarFeriados(year, month);
    }

    async function decorarFeriados(year, month) {
      if (!feriadosPorAno[year]) {
        try {
          const res = await fetch(`https://brasilapi.com.br/api/feriados/v1/${year}`);
          if (!res.ok) return;
          feriadosPorAno[year] = await res.json();
        } catch (e) {
          return; // falha silenciosa; calendário segue sem feriados
        }
      }

      const monthStr = String(month + 1).padStart(2, "0");
      feriadosPorAno[year].forEach((f) => {
        if (!f.date.startsWith(`${year}-${monthStr}`)) return;
        const cell = calendar.querySelector(`[data-date="${f.date}"]`);
        if (!cell) return;
        const evEl = document.createElement("div");
        evEl.className = "calendar-event event-feriado";
        evEl.textContent = f.name;
        evEl.title = f.name;
        cell.appendChild(evEl);
      });
    }

    document.getElementById("prev-month").addEventListener("click", () => {
      if (currentMonth === 0) { currentMonth = 11; currentYear--; }
      else { currentMonth--; }
      renderCalendar(currentYear, currentMonth);
    });

    document.getElementById("next-month").addEventListener("click", () => {
      if (currentMonth === 11) { currentMonth = 0; currentYear++; }
      else { currentMonth++; }
      renderCalendar(currentYear, currentMonth);
    });

    renderCalendar(currentYear, currentMonth);
  </script>
</body>
</html>
