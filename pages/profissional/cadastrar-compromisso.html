<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novo Compromisso | MyPersonal</title>
  <link rel="stylesheet" href="../../assets/css/reset.css">
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages/compromisso.css">
  <link rel="stylesheet" href="../../assets/css/responsive.css">
</head>
<body data-page-title="Novo Compromisso" data-back="agenda.html|Agenda" data-active-page="agenda">
  <div class="app-layout">
    <div id="sidebar-mount"></div>
    <div id="topbar-mount"></div>

    <main class="main-content">

      <form id="compromisso-form" novalidate>
        <div class="form-page-grid">
          <!-- Coluna esquerda: campos do compromisso -->
          <div>
            <h2 class="form-section-title">Dados do compromisso</h2>

            <div class="form-row row-2">
              <div class="input-group">
                <label for="tipo">Tipo de compromisso</label>
                <select id="tipo" name="tipo" class="form-control">
                  <option value="">Selecione...</option>
                  <option value="treino">Treino</option>
                  <option value="consulta">Consulta</option>
                  <option value="troca-treino">Troca de treino</option>
                  <option value="avaliacao">Avaliação</option>
                  <option value="outro">Outro</option>
                </select>
                <span class="error-message"></span>
              </div>

              <div class="input-group">
                <label for="aluno">Aluno</label>
                <select id="aluno" name="aluno" class="form-control">
                  <option value="">Selecionar aluno...</option>
                </select>
                <span class="error-message"></span>
              </div>
            </div>

            <div class="form-row row-3">
              <div class="input-group">
                <label for="data">Data</label>
                <input type="date" id="data" name="data" class="form-control">
                <span class="error-message"></span>
              </div>

              <div class="input-group">
                <label for="hora-inicio">Hora início</label>
                <input type="time" id="hora-inicio" name="hora-inicio" class="form-control">
                <span class="error-message"></span>
              </div>

              <div class="input-group">
                <label for="hora-fim">Hora fim</label>
                <input type="time" id="hora-fim" name="hora-fim" class="form-control">
                <span class="error-message"></span>
              </div>
            </div>

            <div class="form-row row-2">
              <div class="input-group">
                <label for="local">Local / Modalidade</label>
                <select id="local" name="local" class="form-control">
                  <option value="">Selecione...</option>
                  <option value="presencial">Presencial</option>
                  <option value="online">Online</option>
                  <option value="academia">Academia</option>
                </select>
              </div>

              <div class="input-group">
                <label for="recorrencia">Recorrência</label>
                <select id="recorrencia" name="recorrencia" class="form-control">
                  <option value="nao">Não repete</option>
                  <option value="semanal">Semanal</option>
                  <option value="quinzenal">Quinzenal</option>
                  <option value="mensal">Mensal</option>
                </select>
              </div>
            </div>

            <div class="input-group">
              <label for="lembrete">Lembrete</label>
              <select id="lembrete" name="lembrete" class="form-control" style="max-width: 270px;">
                <option value="30min">30 min antes</option>
                <option value="1h">1 hora antes</option>
                <option value="1dia">1 dia antes</option>
                <option value="nenhum">Sem lembrete</option>
              </select>
            </div>

            <h2 class="form-section-title" style="margin-top: var(--space-6);">Descrição / observações</h2>

            <div class="input-group">
              <textarea id="descricao" name="descricao" class="form-control" rows="4"
                placeholder="Detalhes adicionais sobre o compromisso"></textarea>
            </div>
          </div>

          <!-- Coluna direita: preview + conflitos -->
          <div>
            <h2 class="form-section-title">Posição no calendário</h2>

            <div class="mini-calendar">
              <div class="mini-calendar-header" id="mini-calendar-header">Mês atual</div>
              <div class="mini-calendar-grid">
                <div class="mini-calendar-cell is-day-name">D</div>
                <div class="mini-calendar-cell is-day-name">S</div>
                <div class="mini-calendar-cell is-day-name">T</div>
                <div class="mini-calendar-cell is-day-name">Q</div>
                <div class="mini-calendar-cell is-day-name">Q</div>
                <div class="mini-calendar-cell is-day-name">S</div>
                <div class="mini-calendar-cell is-day-name">S</div>
                <!-- dias gerados via JS -->
              </div>
            </div>

            <h2 class="form-section-title" style="margin-top: var(--space-6);">Alunos com agenda neste horário</h2>
            <div class="conflicts-list">
              <!-- preenchido pelo localStorage -->
            </div>
          </div>
        </div>

        <!-- Ações -->
        <div class="form-actions">
          <a href="agenda.html" class="btn btn-secondary">Cancelar</a>
          <button type="submit" class="btn btn-primary">Salvar compromisso</button>
        </div>
      </form>

    </main>
  </div>

  <script src="../../assets/js/sidebar-loader.js"></script>
  <script src="../../assets/js/auth-storage.js"></script>
  <script src="../../assets/js/aluno-contexto.js"></script>
  <script src="../../assets/js/validation.js"></script>
  <script src="../../assets/js/compromissos-store.js"></script>
  <script>
    function buscarAlunosDoLocalStorage() {
      if (window.AlunoContexto && typeof window.AlunoContexto.listarAlunosDoProfissional === "function") {
        return window.AlunoContexto.listarAlunosDoProfissional()
          .filter((usuario) => usuario.status !== "inativo")
          .map((usuario) => ({
            id: usuario.id || usuario.alunoId || usuario.email,
            nome: usuario.nome || usuario.email,
          }))
          .filter((aluno) => aluno.id && aluno.nome);
      }

      if (typeof getUsuarios !== "function") return [];

      return Object.values(getUsuarios())
        .filter((usuario) => usuario.tipo === "aluno" || usuario.perfil === "aluno")
        .filter((usuario) => usuario.status !== "inativo")
        .map((usuario) => ({
          id: usuario.id || usuario.alunoId || usuario.email,
          nome: usuario.nome || usuario.email,
        }))
        .filter((aluno) => aluno.id && aluno.nome);
    }

    function carregarAlunosNoSelect() {
      const alunoSelect = document.getElementById("aluno");
      const alunos = buscarAlunosDoLocalStorage();

      alunoSelect.innerHTML = '<option value="">Selecionar aluno...</option>';

      if (!alunos.length) {
        const option = document.createElement("option");
        option.value = "";
        option.textContent = "Nenhum aluno ativo cadastrado";
        option.disabled = true;
        alunoSelect.appendChild(option);
        return;
      }

      alunos.forEach((aluno) => {
        const option = document.createElement("option");
        option.value = aluno.id;
        option.textContent = aluno.nome;
        alunoSelect.appendChild(option);
      });
    }

    carregarAlunosNoSelect();

    const NOMES_MES_MINI = [
      "Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho",
      "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"
    ];

    function pad2Mini(numero) {
      return String(numero).padStart(2, "0");
    }

    function isoMini(data) {
      return `${data.getFullYear()}-${pad2Mini(data.getMonth() + 1)}-${pad2Mini(data.getDate())}`;
    }

    function getProfissionalAtualCompromisso() {
      return window.AlunoContexto?.getProfissionalIdAtual?.() || "profissional-demo";
    }

    function compromissosDoProfissional() {
      const profissionalId = getProfissionalAtualCompromisso();
      const lista = typeof getCompromissos === "function" ? getCompromissos() : [];
      return lista.filter((compromisso) => {
        return !compromisso.profissionalId || compromisso.profissionalId === profissionalId;
      });
    }

    function renderizarMiniCalendario() {
      const miniGrid = document.querySelector(".mini-calendar-grid");
      const miniHeader = document.getElementById("mini-calendar-header");
      if (!miniGrid || !miniHeader) return;

      const hoje = new Date();
      const ano = hoje.getFullYear();
      const mes = hoje.getMonth();
      const offset = new Date(ano, mes, 1).getDay();
      const daysInMonth = new Date(ano, mes + 1, 0).getDate();
      const compromissos = compromissosDoProfissional();
      const datasComCompromisso = new Set(compromissos.map((c) => c.data));

      miniHeader.textContent = `${NOMES_MES_MINI[mes]} ${ano}`;
      miniGrid.querySelectorAll(".mini-calendar-cell:not(.is-day-name)").forEach((cell) => cell.remove());

      for (let i = 0; i < offset; i++) {
        const empty = document.createElement("div");
        empty.className = "mini-calendar-cell";
        miniGrid.appendChild(empty);
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const cell = document.createElement("div");
        const data = new Date(ano, mes, day);
        const dateKey = isoMini(data);
        cell.className = "mini-calendar-cell";
        cell.textContent = day;
        if (day === hoje.getDate()) cell.classList.add("is-selected");
        if (datasComCompromisso.has(dateKey)) cell.classList.add("has-conflict");
        miniGrid.appendChild(cell);
      }
    }

    function renderizarListaConflitos() {
      const lista = document.querySelector(".conflicts-list");
      if (!lista) return;

      const compromissos = compromissosDoProfissional()
        .filter((c) => c.status !== "Cancelado" && c.status !== "Cancelada")
        .sort((a, b) => `${a.data} ${a.horaInicio}`.localeCompare(`${b.data} ${b.horaInicio}`))
        .slice(0, 4);

      lista.innerHTML = "";

      if (!compromissos.length) {
        const item = document.createElement("div");
        item.className = "conflict-item";
        item.textContent = "Nenhum compromisso cadastrado.";
        lista.appendChild(item);
        return;
      }

      compromissos.forEach((compromisso) => {
        const item = document.createElement("div");
        item.className = "conflict-item";
        const data = compromisso.data ? compromisso.data.split("-").reverse().join("/") : "Data não informada";
        item.innerHTML = `<strong>${compromisso.alunoNome || "Aluno"}</strong> · ${data} · ${compromisso.horaInicio || "--:--"}–${compromisso.horaFim || "--:--"}`;
        lista.appendChild(item);
      });
    }

    renderizarMiniCalendario();
    renderizarListaConflitos();

    // Validação do formulário
    setupFormValidation("compromisso-form", {
      tipo:          [Rules.required],
      aluno:         [Rules.required],
      data:          [Rules.required, Rules.date],
      "hora-inicio": [Rules.required],
      "hora-fim":    [Rules.required],
    }, () => {
      const alunoSelect = document.getElementById("aluno");
      const alunoNome = alunoSelect.options[alunoSelect.selectedIndex].text;
      const horaInicio = document.getElementById("hora-inicio").value;
      const horaFim = document.getElementById("hora-fim").value;

      if (horaFim <= horaInicio) {
        alert("A hora final deve ser maior que a hora inicial.");
        return;
      }

      const ocorrencias = adicionarCompromissosRecorrentes({
        tipo: document.getElementById("tipo").value,
        alunoId: alunoSelect.value,
        alunoNome: alunoNome,
        profissionalId: window.AlunoContexto?.getProfissionalIdAtual?.() || "profissional-demo",
        data: document.getElementById("data").value,          // YYYY-MM-DD
        horaInicio: horaInicio,
        horaFim: horaFim,
        local: document.getElementById("local").value,
        recorrencia: document.getElementById("recorrencia").value,
        lembrete: document.getElementById("lembrete").value,
        descricao: document.getElementById("descricao").value,
        status: "Agendado",
      });

      const total = ocorrencias.length;
      alert(total > 1 ? `${total} compromissos recorrentes salvos com sucesso!` : "Compromisso salvo com sucesso!");
      window.location.href = "agenda.html";
    });
  </script>
</body>
</html>
