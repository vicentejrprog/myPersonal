<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minha Dieta | MyPersonal</title>
  <link rel="stylesheet" href="../../assets/css/reset.css">
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages/dietas.css">
  <link rel="stylesheet" href="../../assets/css/responsive.css">
</head>
<body data-profile="aluno" data-page-title="Minha Dieta" data-active-page="minha-dieta" data-diet-page="student">
  <div class="app-layout">
    <div id="sidebar-mount"></div>
    <div id="topbar-mount"></div>

    <main class="main-content">
      <div class="days" aria-label="Dias da semana"></div>

      <div class="meal-grid" data-diet-meals></div>

      <h2 class="section-title">Totais do dia</h2>
      <div class="totals" data-diet-totals></div>

      <div class="two-columns">
        <section>
          <h2 class="section-title">Observações do profissional sobre a dieta</h2>
          <div class="muted-box medium-box">
            <p class="note-box" data-diet-notes></p>
          </div>
        </section>

        <section>
          <h2 class="section-title">Histórico de dietas anteriores</h2>
          <div class="muted-box medium-box">
            <ul class="history-list" data-diet-history>
              <li><span>-</span><strong>Sem histórico</strong></li>
            </ul>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script src="../../assets/js/sidebar-loader.js"></script>
  <script src="../../assets/js/aluno-contexto.js"></script>
  <script src="../../assets/js/dietas-storage.js"></script>
</body>
</html>
