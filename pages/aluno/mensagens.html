<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mensagens | MyPersonal</title>
  <link rel="stylesheet" href="../../assets/css/reset.css">
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/layout.css">
  <link rel="stylesheet" href="../../assets/css/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/pages/mensagens.css">
  <link rel="stylesheet" href="../../assets/css/responsive.css">
</head>
<body data-profile="aluno" data-page-title="Mensagens" data-active-page="mensagens" class="chat-page">
  <div class="app-layout">
    <div id="sidebar-mount"></div>
    <div id="topbar-mount"></div>

    <main class="main-content">
      <div class="chat-layout">
        <aside class="chat-list">
          <div class="chat-search">
            <input type="search" class="form-control" placeholder="Buscar conversa...">
          </div>

          <div class="chat-conversations" id="chat-conversations"></div>
        </aside>

        <section class="chat-thread">
          <header class="chat-thread-header">
            <p class="name" id="thread-name">Conversa</p>
            <p class="status">● Online</p>
          </header>

          <div class="chat-messages" id="chat-messages"></div>

          <form class="chat-input" id="chat-form">
            <input type="text" id="message-input" class="form-control" placeholder="Digite uma mensagem..." autocomplete="off">
            <button type="submit" class="btn btn-primary">Enviar</button>
          </form>
        </section>
      </div>
    </main>
  </div>

  <script src="../../assets/js/sidebar-loader.js"></script>
  <script>
    const STORAGE_KEY_ALUNO = "mypersonal:conversasAluno";

    function carregarConversasAluno() {
      try {
        const salvo = JSON.parse(localStorage.getItem(STORAGE_KEY_ALUNO));
        return salvo && typeof salvo === "object" ? salvo : {};
      } catch (err) {
        return {};
      }
    }

    function salvarConversasAluno() {
      try {
        localStorage.setItem(STORAGE_KEY_ALUNO, JSON.stringify(conversasAluno));
      } catch (err) {}
    }

    function iniciaisChat(nome) {
      return String(nome || "C")
        .split(/\s+/)
        .filter(Boolean)
        .slice(0, 2)
        .map((parte) => parte[0]?.toUpperCase() || "")
        .join("") || "C";
    }

    function criarItemConversa(convId, conv) {
      const item = document.createElement("div");
      item.className = "chat-conversation";
      item.dataset.conv = convId;

      const avatar = document.createElement("div");
      avatar.className = "avatar avatar-sm";
      avatar.textContent = iniciaisChat(conv.nome);

      const info = document.createElement("div");
      info.className = "chat-conv-info";

      const nome = document.createElement("p");
      nome.className = "chat-conv-name";
      nome.textContent = conv.nome || "Conversa";

      const preview = document.createElement("p");
      preview.className = "chat-conv-preview";
      const ultima = conv.mensagens?.[conv.mensagens.length - 1];
      preview.textContent = ultima?.texto || "Sem mensagens";

      const time = document.createElement("span");
      time.className = "chat-conv-time";
      time.textContent = ultima?.tipo === "sent" ? "Agora" : "";

      info.append(nome, preview);
      item.append(avatar, info, time);
      item.addEventListener("click", () => selecionarConversa(convId));
      return item;
    }

    const form = document.getElementById("chat-form");
    const input = document.getElementById("message-input");
    const messages = document.getElementById("chat-messages");
    const conversasEl = document.getElementById("chat-conversations");
    const threadName = document.getElementById("thread-name");
    const statusEl = document.querySelector(".chat-thread-header .status");

    const conversasAluno = carregarConversasAluno();
    let conversaAtiva = Object.keys(conversasAluno)[0] || "";

    function renderizarListaConversas() {
      conversasEl.innerHTML = "";
      const ids = Object.keys(conversasAluno);

      if (!ids.length) {
        const vazio = document.createElement("div");
        vazio.className = "chat-conversation is-active";
        vazio.textContent = "Nenhuma conversa encontrada.";
        conversasEl.appendChild(vazio);
        return;
      }

      ids.forEach((id) => {
        const item = criarItemConversa(id, conversasAluno[id]);
        if (id === conversaAtiva) item.classList.add("is-active");
        conversasEl.appendChild(item);
      });
    }

    function selecionarConversa(convId) {
      conversaAtiva = convId;
      renderizarListaConversas();
      renderThread(convId);
    }

    function renderThread(convId) {
      const conv = conversasAluno[convId];
      messages.innerHTML = "";

      if (!conv) {
        threadName.textContent = "Conversa";
        if (statusEl) statusEl.textContent = "";
        return;
      }

      threadName.textContent = conv.nome || "Conversa";
      if (statusEl) statusEl.textContent = conv.status || "● Online";

      (conv.mensagens || []).forEach((m) => {
        const msg = document.createElement("div");
        msg.className = `message message-${m.tipo}`;

        const autor = document.createElement("span");
        autor.className = "message-author";
        autor.textContent = m.autor;

        const bubble = document.createElement("div");
        bubble.className = "message-bubble";
        bubble.textContent = m.texto;

        msg.append(autor, bubble);
        messages.appendChild(msg);
      });

      messages.scrollTop = messages.scrollHeight;
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text || !conversaAtiva || !conversasAluno[conversaAtiva]) return;

      conversasAluno[conversaAtiva].mensagens ||= [];
      conversasAluno[conversaAtiva].mensagens.push({
        autor: "Você",
        texto: text,
        tipo: "sent",
      });

      salvarConversasAluno();
      renderizarListaConversas();
      renderThread(conversaAtiva);
      input.value = "";
    });

    renderizarListaConversas();
    renderThread(conversaAtiva);
  </script>
</body>
</html>
