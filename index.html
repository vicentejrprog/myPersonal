<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | MyPersonal</title>
  <link rel="stylesheet" href="assets/css/reset.css">
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
  <main class="auth-layout">
    <section class="auth-brand">
      <div class="logo">MP</div>
      <h1 class="app-name">MyPersonal</h1>
      <p class="app-tagline">Plataforma de acompanhamento entre profissionais e alunos</p>

      <div class="auth-features">
        <div class="auth-feature"><span class="auth-feature-check">✓</span><span>Treinos e dietas centralizados</span></div>
        <div class="auth-feature"><span class="auth-feature-check">✓</span><span>Agenda e evolução física</span></div>
        <div class="auth-feature"><span class="auth-feature-check">✓</span><span>Histórico e comunicação</span></div>
      </div>
    </section>

    <section class="auth-form-wrapper">
      <h2 class="auth-form-title">Entrar na conta</h2>
      <p class="auth-form-subtitle">Acesse sua conta para continuar</p>

      <form id="login-form" novalidate>
        <div class="input-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" class="form-control" placeholder="seu@email.com" autocomplete="email">
          <span class="error-message"></span>
        </div>

        <div class="input-group">
          <label for="senha">Senha</label>
          <div class="password-wrapper">
            <input type="password" id="senha" name="senha" class="form-control" placeholder="••••••••" autocomplete="current-password">
            <button type="button" class="password-toggle" id="toggle-senha" aria-label="Mostrar senha">👁</button>
          </div>
          <span class="error-message"></span>
        </div>

        <a href="#" class="forgot-link">Esqueci minha senha</a>

        <button type="submit" class="btn btn-primary btn-block btn-lg">Entrar</button>

        <div class="auth-divider">ou</div>

        <a href="#" class="btn btn-secondary btn-block btn-lg">Criar conta</a>
      </form>
    </section>
  </main>

  <script src="assets/js/validation.js"></script>
  <script>
    setupFormValidation("login-form", {
      email: [Rules.required, Rules.email],
      senha: [Rules.required, Rules.password],
    }, () => {
      window.location.href = "pages/auth/identificacao-perfil.html";
    });

    const toggleSenha = document.getElementById("toggle-senha");
    const senhaInput  = document.getElementById("senha");

    toggleSenha.addEventListener("click", () => {
      const oculta = senhaInput.type === "password";
      senhaInput.type = oculta ? "text" : "password";
      toggleSenha.textContent = oculta ? "🙈" : "👁";
      toggleSenha.setAttribute("aria-label", oculta ? "Ocultar senha" : "Mostrar senha");
    });
  </script>
</body>
</html>
